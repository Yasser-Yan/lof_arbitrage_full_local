<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LOF套利监控</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f14;
      --panel: #111823;
      --panel-2: #151f2c;
      --line: #243140;
      --text: #d9e3ee;
      --muted: #7f8c9a;
      --red: #ff5f62;
      --green: #35d07f;
      --amber: #f6bd45;
      --blue: #65a7ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      font-size: 13px;
    }
    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto auto auto 1fr auto;
      max-width: 1520px;
      margin: 0 auto;
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
      background: #0b0f14;
    }
    header {
      background: #0f151d;
      border-bottom: 1px solid var(--line);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    h1 {
      margin: 0;
      font-size: 19px;
      line-height: 1;
      letter-spacing: 0;
      color: #f4f8fc;
      white-space: nowrap;
    }
    .meta {
      color: var(--muted);
      white-space: nowrap;
    }
    .badge {
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 4px 8px;
      color: var(--muted);
      background: #0b1118;
      white-space: nowrap;
    }
    .badge.live { color: var(--green); border-color: rgba(53,208,127,.35); }
    .spacer { flex: 1; min-width: 12px; }
    button, .toggle {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--panel-2);
      color: var(--text);
      padding: 0 12px;
      font: inherit;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover, .toggle:hover { border-color: #3b5168; background: #1a2635; }
    button.primary { background: #21456f; border-color: #2c5f98; color: #f7fbff; }
    button.good { background: #163c2a; border-color: #226d49; color: #ddffec; }
    button:disabled { opacity: .55; cursor: wait; }
    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .switch {
      width: 34px;
      height: 18px;
      border-radius: 18px;
      background: #334050;
      position: relative;
    }
    .switch::after {
      content: "";
      width: 14px;
      height: 14px;
      position: absolute;
      left: 2px;
      top: 2px;
      border-radius: 50%;
      background: #9aa7b5;
      transition: left .18s ease, background .18s ease;
    }
    .toggle.on .switch { background: #1f7b50; }
    .toggle.on .switch::after { left: 18px; background: #eafff3; }
    .tabs {
      background: #0d131b;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      overflow-x: auto;
    }
    .tab {
      min-width: 0;
      background: transparent;
      border-color: transparent;
      color: var(--muted);
      padding: 0 9px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .tab.active {
      background: var(--panel-2);
      border-color: #3a4f66;
      color: #ffffff;
    }
    .tab-count {
      min-width: 22px;
      height: 18px;
      padding: 0 6px;
      border-radius: 9px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #223044;
      color: #c6d5e4;
      font-size: 11px;
      font-family: Consolas, "SFMono-Regular", monospace;
    }
    .tab.active .tab-count {
      background: #2c5f98;
      color: #fff;
    }
    .search {
      width: 260px;
      height: 34px;
      background: #0b1118;
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 4px;
      padding: 0 10px;
      outline: none;
    }
    .search:focus { border-color: var(--blue); }
    .search-tools {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .search-tip {
      min-width: 220px;
      max-width: 360px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(5, minmax(120px, 1fr));
      gap: 1px;
      background: var(--line);
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }
    .stat {
      background: var(--panel);
      padding: 8px 14px;
      min-height: 48px;
    }
    .stat span { display: block; color: var(--muted); font-size: 12px; margin-bottom: 4px; }
    .stat b { font-size: 18px; font-weight: 700; }
    .table-wrap {
      min-height: 0;
      overflow: auto;
      background: #0b0f14;
      padding: 14px 18px 18px;
    }
    table {
      width: 100%;
      min-width: 1200px;
      border-collapse: collapse;
      border: 1px solid var(--line);
      background: #0f151d;
    }
    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #121a25;
      color: #9facba;
      font-weight: 600;
      text-align: right;
      padding: 10px 10px;
      border: 1px solid var(--line);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    th:first-child, th:nth-child(2), td:first-child, td:nth-child(2) { text-align: left; }
    td {
      padding: 9px 10px;
      border: 1px solid rgba(36,49,64,.85);
      text-align: right;
      white-space: nowrap;
      background: #0f151d;
    }
    tr:nth-child(even) td { background: #101a25; }
    tr:hover td { background: #172232; }
    .code { font-family: Consolas, "SFMono-Regular", monospace; color: #9fb3c9; }
    .name {
      max-width: 240px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .muted { color: var(--muted); }
    .red { color: var(--red); }
    .green { color: var(--green); }
    .amber { color: var(--amber); }
    .premium {
      font-weight: 700;
      border-radius: 4px;
      display: inline-block;
      min-width: 74px;
      padding: 3px 6px;
      text-align: right;
      background: rgba(127,140,154,.12);
    }
    .premium.red { background: rgba(255,95,98,.12); }
    .premium.green { background: rgba(53,208,127,.12); }
    .status {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      min-width: 64px;
      border-radius: 4px;
      padding: 3px 6px;
      background: rgba(127,140,154,.12);
      color: var(--muted);
    }
    .status.open {
      background: rgba(53,208,127,.12);
      color: var(--green);
    }
    .status.warn {
      background: rgba(246,189,69,.12);
      color: var(--amber);
    }
    .status.closed {
      background: rgba(255,95,98,.12);
      color: var(--red);
    }
    .status-limit {
      color: var(--muted);
      font-size: 12px;
    }
    footer {
      background: #0f151d;
      border-top: 1px solid var(--line);
      color: var(--muted);
      padding: 9px 18px;
      display: flex;
      gap: 16px;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    .empty {
      padding: 48px;
      text-align: center;
      color: var(--muted);
    }
    @media (max-width: 760px) {
      body { overflow: auto; }
      .app { min-height: 100vh; height: auto; }
      .summary { grid-template-columns: repeat(2, 1fr); }
      .search { width: 100%; margin-left: 0; }
      .search-tools { width: 100%; margin-left: 0; flex-wrap: wrap; }
      .search-tip { min-width: 0; width: 100%; }
      .spacer { display: none; }
      header button, .toggle { flex: 1; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>LOF套利监控</h1>
      <span class="meta" id="updated">等待数据</span>
      <span class="badge" id="trading">交易状态</span>
      <span class="spacer"></span>
      <button class="good" id="fastBtn">快速刷新</button>
      <button class="primary" id="fullBtn">全量刷新</button>
      <button id="exportBtn">导出CSV</button>
      <button id="shutdownBtn">退出程序</button>
      <div class="toggle" id="autoToggle"><span>自动刷新</span><i class="switch"></i></div>
    </header>

    <nav class="tabs">
      <button class="tab active" data-group="stock">股票LOF</button>
      <button class="tab" data-group="index">指数LOF</button>
      <button class="tab" data-group="qdii_europe_us">欧美市场</button>
      <button class="tab" data-group="qdii_asia">亚洲市场</button>
      <div class="search-tools">
        <input class="search" id="search" placeholder="搜索代码或名称">
        <button id="searchAddBtn">搜索/添加</button>
        <span class="search-tip" id="searchTip">可添加场内 LOF，缺数据时等待刷新补齐</span>
      </div>
    </nav>

    <section class="summary">
      <div class="stat"><span>当前列表</span><b id="statCount">0</b></div>
      <div class="stat"><span>可计算溢价率</span><b id="statPriced">0</b></div>
      <div class="stat"><span>平均溢价率</span><b id="statAvg">-</b></div>
      <div class="stat"><span>溢价 &gt; 3%</span><b class="red" id="statHigh">0</b></div>
      <div class="stat"><span>折价 &lt; -3%</span><b class="green" id="statLow">0</b></div>
    </section>

    <main class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-sort="code">代码</th>
            <th data-sort="name">名称</th>
            <th data-sort="price_date">现价日期</th>
            <th data-sort="price">现价</th>
            <th data-sort="change_pct">涨跌幅</th>
            <th data-sort="nav">净值</th>
            <th data-sort="nav_date">净值日期</th>
            <th data-sort="premium">溢价率</th>
            <th data-sort="amount">成交额(万)</th>
            <th data-sort="volume">成交量</th>
            <th data-sort="apply_status">申购</th>
            <th data-sort="redeem_status">赎回</th>
            <th data-sort="nav_source">净值来源</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </main>

    <footer>
      <span id="message">启动后会自动打开本页并抓取数据。</span>
      <span>显示所有可参与套利观察的场内 LOF；价格和净值齐全时自动计算溢价率。</span>
      <span>基金配置保存在 EXE 同目录的 funds_config.json。</span>
      <span>溢价率 = (场内现价 - 基金净值) / 基金净值 × 100%</span>
    </footer>
  </div>

  <script>
    const state = {
      funds: [],
      group: "stock",
      sort: "premium",
      dir: "desc",
      auto: false,
      timer: null
    };
    const groupLabels = {
      stock: "股票LOF",
      index: "指数LOF",
      qdii_europe_us: "欧美市场",
      qdii_asia: "亚洲市场"
    };

    const tbody = document.getElementById("tbody");
    const search = document.getElementById("search");
    const fullBtn = document.getElementById("fullBtn");
    const fastBtn = document.getElementById("fastBtn");
    const autoToggle = document.getElementById("autoToggle");
    const shutdownBtn = document.getElementById("shutdownBtn");
    const searchAddBtn = document.getElementById("searchAddBtn");
    const searchTip = document.getElementById("searchTip");

    function fmt(n, digits = 2) {
      if (n === null || n === undefined || Number.isNaN(Number(n))) return "-";
      return Number(n).toFixed(digits);
    }

    function fmtPct(n) {
      if (n === null || n === undefined || Number.isNaN(Number(n))) return "-";
      const v = Number(n);
      return (v > 0 ? "+" : "") + v.toFixed(2) + "%";
    }

    function colorClass(n) {
      if (n === null || n === undefined || Number.isNaN(Number(n))) return "muted";
      return Number(n) > 0 ? "red" : Number(n) < 0 ? "green" : "muted";
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      })[ch]);
    }

    function statusClass(status) {
      const s = String(status || "");
      if (!s) return "muted";
      if (/开放|可申购|可赎回/.test(s) && !/暂停|禁止|不可|关闭|限/.test(s)) return "open";
      if (/限|暂停|禁止|不可|关闭/.test(s)) return /限/.test(s) && !/暂停|禁止|不可|关闭/.test(s) ? "warn" : "closed";
      return "muted";
    }

    function statusCell(status, limit = "") {
      if (!status) return '<span class="muted">-</span>';
      const cls = statusClass(status);
      const suffix = limit && limit !== "无限额" && /限/.test(String(status)) ? `<span class="status-limit">${escapeHtml(limit)}</span>` : "";
      return `<span class="status ${cls}">${escapeHtml(status)}${suffix}</span>`;
    }

    function filtered() {
      const kw = search.value.trim().toLowerCase();
      return state.funds.filter(f => {
        if (f.group !== state.group) return false;
        if (!kw) return true;
        return String(f.code).includes(kw) || String(f.name || "").toLowerCase().includes(kw);
      });
    }

    function sortedRows(rows) {
      return rows.slice().sort((a, b) => {
        let av = a[state.sort], bv = b[state.sort];
        if (av === null || av === undefined || av === "") av = state.dir === "asc" ? Infinity : -Infinity;
        if (bv === null || bv === undefined || bv === "") bv = state.dir === "asc" ? Infinity : -Infinity;
        const an = Number(av), bn = Number(bv);
        if (!Number.isNaN(an) && !Number.isNaN(bn)) { av = an; bv = bn; }
        else { av = String(av).toLowerCase(); bv = String(bv).toLowerCase(); }
        if (av < bv) return state.dir === "asc" ? -1 : 1;
        if (av > bv) return state.dir === "asc" ? 1 : -1;
        return 0;
      });
    }

    function render() {
      const rows = sortedRows(filtered());
      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="13"><div class="empty">当前分类暂无匹配。可以点击“搜索/添加”尝试识别 LOF 并加入。</div></td></tr>';
      } else {
        tbody.innerHTML = rows.map(f => {
          const premiumClass = colorClass(f.premium);
          const changeClass = colorClass(f.change_pct);
          return `<tr>
            <td class="code">${f.code || "-"}</td>
            <td class="name" title="${f.name || ""}">${f.name || "-"}</td>
            <td class="muted">${f.price_date || "-"}</td>
            <td>${fmt(f.price, 3)}</td>
            <td class="${changeClass}">${fmtPct(f.change_pct)}</td>
            <td>${fmt(f.nav, 4)}</td>
            <td class="muted">${f.nav_date || "-"}</td>
            <td><span class="premium ${premiumClass}">${fmtPct(f.premium)}</span></td>
            <td>${fmt(f.amount, 0)}</td>
            <td>${fmt(f.volume, 0)}</td>
            <td>${statusCell(f.apply_status, f.apply_limit)}</td>
            <td>${statusCell(f.redeem_status)}</td>
            <td class="muted">${f.nav_source || "-"}</td>
          </tr>`;
        }).join("");
      }
      updateStats(rows);
      const kw = search.value.trim();
      const anyLocal = kw && state.funds.some(f => String(f.code).includes(kw) || String(f.name || "").toLowerCase().includes(kw.toLowerCase()));
      searchTip.textContent = kw ? (anyLocal ? "已在当前数据库中找到匹配" : "未在当前数据库中找到，可尝试识别是否为场内 LOF") : "可添加场内 LOF，缺数据时等待刷新补齐";
    }

    function updateStats(rows) {
      const priced = rows.filter(f => f.premium !== null && f.premium !== undefined && !Number.isNaN(Number(f.premium)));
      const avg = priced.length ? priced.reduce((s, f) => s + Number(f.premium), 0) / priced.length : null;
      document.getElementById("statCount").textContent = rows.length;
      document.getElementById("statPriced").textContent = priced.length;
      document.getElementById("statAvg").textContent = avg === null ? "-" : fmtPct(avg);
      document.getElementById("statAvg").className = colorClass(avg);
      document.getElementById("statHigh").textContent = priced.filter(f => Number(f.premium) > 3).length;
      document.getElementById("statLow").textContent = priced.filter(f => Number(f.premium) < -3).length;
    }

    function updateGroupCounts() {
      const counts = { stock: 0, index: 0, qdii_europe_us: 0, qdii_asia: 0 };
      state.funds.forEach(f => {
        if (Object.prototype.hasOwnProperty.call(counts, f.group)) counts[f.group]++;
      });
      document.querySelectorAll(".tab").forEach(btn => {
        const group = btn.dataset.group;
        btn.innerHTML = `<span>${groupLabels[group] || group}</span><span class="tab-count">${counts[group] || 0}</span>`;
      });
    }

    function applyData(data) {
      state.funds = data.funds || [];
      document.getElementById("updated").textContent = data.updated ? "更新：" + data.updated : "等待更新";
      document.getElementById("message").textContent = data.message || "";
      const trading = document.getElementById("trading");
      trading.textContent = data.trading ? "交易时间" : "非交易时间";
      trading.className = data.trading ? "badge live" : "badge";
      updateGroupCounts();
      render();
    }

    async function loadData() {
      const res = await fetch("/api/data?t=" + Date.now());
      const data = await res.json();
      if (!res.ok || data.ok === false) throw new Error(data.message || "数据加载失败");
      applyData(data);
      return data;
    }

    async function refresh(url, btn, text) {
      btn.disabled = true;
      const old = btn.textContent;
      btn.textContent = text;
      try {
        await fetch(url + "?t=" + Date.now());
        if (url.includes("refresh_fast")) {
          await new Promise(r => setTimeout(r, 400));
          await loadData();
        } else {
          let completed = false;
          for (let i = 0; i < 90; i++) {
            await new Promise(r => setTimeout(r, 2000));
            const data = await loadData();
            if (!data.refreshing) {
              completed = true;
              break;
            }
            btn.textContent = `全量刷新中 ${i * 2 + 2}s`;
          }
          if (!completed) throw new Error("全量刷新仍在后台进行，请稍后查看");
        }
      } catch (err) {
        document.getElementById("message").textContent = err.message || "刷新失败";
      } finally {
        btn.disabled = false;
        btn.textContent = old;
      }
    }

    async function searchOrAdd() {
      const q = search.value.trim();
      if (!q) {
        searchTip.textContent = "请输入基金代码或名称";
        return;
      }
      const local = state.funds.find(f => f.code === q || String(f.name || "").includes(q));
      if (local) {
        state.group = local.group;
        document.querySelectorAll(".tab").forEach(b => b.classList.toggle("active", b.dataset.group === state.group));
        searchTip.textContent = "已定位到数据库中的基金";
        render();
        return;
      }
      searchAddBtn.disabled = true;
      const old = searchAddBtn.textContent;
      searchAddBtn.textContent = "识别中";
      searchTip.textContent = "正在查询基金代码库并判断是否为 LOF...";
      try {
        const res = await fetch("/api/search_add?q=" + encodeURIComponent(q) + "&t=" + Date.now());
        const data = await res.json();
        if (!res.ok || data.ok === false) throw new Error(data.message || "识别失败");
        await loadData();
        if (data.record && data.record.group) {
          state.group = data.record.group;
          document.querySelectorAll(".tab").forEach(b => b.classList.toggle("active", b.dataset.group === state.group));
          search.value = data.record.code;
        }
        searchTip.textContent = data.message || "已添加";
        render();
      } catch (err) {
        searchTip.textContent = err.message || "搜索添加失败";
      } finally {
        searchAddBtn.disabled = false;
        searchAddBtn.textContent = old;
      }
    }

    document.querySelectorAll(".tab").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        state.group = btn.dataset.group;
        render();
      });
    });

    document.querySelectorAll("th[data-sort]").forEach(th => {
      th.addEventListener("click", () => {
        const col = th.dataset.sort;
        if (state.sort === col) state.dir = state.dir === "asc" ? "desc" : "asc";
        else { state.sort = col; state.dir = "desc"; }
        render();
      });
    });

    search.addEventListener("input", render);
    search.addEventListener("keydown", e => { if (e.key === "Enter") searchOrAdd(); });
    searchAddBtn.addEventListener("click", searchOrAdd);
    fullBtn.addEventListener("click", () => refresh("/api/refresh", fullBtn, "刷新中"));
    fastBtn.addEventListener("click", () => refresh("/api/refresh_fast", fastBtn, "刷新中"));
    document.getElementById("exportBtn").addEventListener("click", () => { location.href = "/api/export.csv"; });
    shutdownBtn.addEventListener("click", async () => {
      if (!confirm("确定退出 LOF套利监控 吗？")) return;
      try { await fetch("/api/shutdown?t=" + Date.now()); } catch (_) {}
      document.getElementById("message").textContent = "程序已退出，重新打开 EXE 可再次启动。";
      setTimeout(() => { window.close(); }, 500);
    });
    autoToggle.addEventListener("click", () => {
      state.auto = !state.auto;
      autoToggle.classList.toggle("on", state.auto);
      if (state.timer) clearInterval(state.timer);
      state.timer = state.auto ? setInterval(() => refresh("/api/refresh_fast", fastBtn, "刷新中"), 30000) : null;
    });

    loadData().catch(err => {
      document.getElementById("message").textContent = err.message || "启动失败";
      render();
    });
    setInterval(() => loadData().catch(() => {}), 30000);
  </script>
</body>
</html>
